name: Check Event Source Links

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links and create report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const https = require('https');
            const http = require('http');

            // Read events.json
            const eventsData = JSON.parse(fs.readFileSync('data/events.json', 'utf8'));
            const events = eventsData.events;

            if (events.length === 0) {
              console.log('No events to check');
              return;
            }

            // Function to check if URL is accessible
            async function checkUrl(url) {
              return new Promise((resolve) => {
                const protocol = url.startsWith('https') ? https : http;
                const req = protocol.get(url, { timeout: 10000 }, (res) => {
                  resolve({
                    accessible: res.statusCode >= 200 && res.statusCode < 400,
                    statusCode: res.statusCode
                  });
                });
                req.on('error', () => resolve({ accessible: false, statusCode: 0 }));
                req.on('timeout', () => {
                  req.destroy();
                  resolve({ accessible: false, statusCode: 0 });
                });
              });
            }

            const brokenLinks = [];
            const checkedCount = events.length;

            console.log(`Checking ${checkedCount} event source links...`);

            for (const event of events) {
              if (event.source) {
                const result = await checkUrl(event.source);
                if (!result.accessible) {
                  brokenLinks.push({
                    id: event.id,
                    source: event.source,
                    source_archive: event.source_archive,
                    statusCode: result.statusCode,
                    issue_number: event.issue_number
                  });
                  console.log(`❌ Broken: ${event.id} - ${event.source} (${result.statusCode})`);
                } else {
                  console.log(`✅ OK: ${event.id}`);
                }
              }
            }

            // Create issue if there are broken links
            if (brokenLinks.length > 0) {
              let issueBody = `## 🔗 链接检查报告 / Link Check Report\n\n`;
              issueBody += `检查时间: ${new Date().toISOString()}\n`;
              issueBody += `检查总数: ${checkedCount}\n`;
              issueBody += `失效链接: ${brokenLinks.length}\n\n`;
              issueBody += `### 失效链接列表 / Broken Links\n\n`;
              issueBody += `| 事件 ID | 原链接状态 | 存档链接 | 关联 Issue |\n`;
              issueBody += `|---------|-----------|---------|------------|\n`;

              for (const link of brokenLinks) {
                const archiveStatus = link.source_archive ? `[存档](${link.source_archive})` : '无存档';
                const issueRef = link.issue_number ? `#${link.issue_number}` : '-';
                issueBody += `| \`${link.id}\` | HTTP ${link.statusCode || 'Error'} | ${archiveStatus} | ${issueRef} |\n`;
              }

              issueBody += `\n### 建议操作 / Suggested Actions\n\n`;
              issueBody += `1. 为失效链接添加 archive.org 存档\n`;
              issueBody += `2. 或寻找替代新闻来源\n`;
              issueBody += `3. 如无法找到有效来源，考虑移除该事件\n`;

              // Check if there's already an open link-check issue
              const existingIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'link-check',
                state: 'open'
              });

              if (existingIssues.data.length > 0) {
                // Update existing issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssues.data[0].number,
                  body: issueBody
                });
                console.log(`Updated existing issue #${existingIssues.data[0].number}`);
              } else {
                // Create new issue
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `🔗 链接检查报告 - ${new Date().toISOString().slice(0, 10)}`,
                  body: issueBody,
                  labels: ['link-check', 'maintenance']
                });
                console.log('Created new link check issue');
              }
            } else {
              console.log('All links are valid! 🎉');
            }
